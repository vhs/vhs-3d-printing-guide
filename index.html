    needs:"PrusaSlicer (already installed on the VHS 3D printing PC, or free at prusaslicer.org for your own machine), a 3D model file (.STL or .3MF — find beginner-friendly models at Printables.com), and the SD card from the printer.",
    modelTip:{title:"Choosing a good first model",lines:["• Choose something small and simple","• Avoid large overhangs (>45°), tall thin objects, or anything marked 'needs supports'","• Look for 'no supports needed' or 'beginner friendly' on Printables","• If it sticks out horizontally like a shelf — it needs supports. If it builds up vertically — it probably doesn't."]},
    steps:[
      {text:"Open PrusaSlicer.",why:"A slicer converts your 3D model into G-code — the list of movement and temperature instructions the printer actually follows. Without slicing, the printer has nothing to do."},
      {text:"Import your model: File › Import, or drag the .STL/.3MF into the window.",why:"The model appears on the virtual bed. You can rotate, scale, and position it before slicing."},
      {text:"Select the printer profile: Original Prusa i3 MK3S & MK3S+ in the top-right dropdown.",why:"This tells PrusaSlicer the exact physical dimensions and capabilities of the MK3S. Using the wrong profile generates incorrect G-code and can damage the printer."},
      {text:"Select PLA (or other filament being used) from the filament dropdown.",why:"PLA settings (temperature, speed, cooling) are pre-configured in this profile."},
      {text:"Choose a printing profile from the top right dropdown. 0.20mm QUALITY is a good starting point.",why:"0.20 mm is the best balance of quality and speed for beginners. 0.10 mm = finer detail but 2× longer. 0.30 mm = faster but visibly rougher.",img:SETTINGS_IMG},
      {text:"Click Slice Now (bottom right of screen). Wait a few seconds.",why:"The slicer calculates every single movement, temperature change, and fan speed for your entire print. This produces the G-code file."},
      {text:"Review the preview: use the layer slider on the right side to scroll through every layer. Look for gaps, floating sections, or missing geometry.",why:"This is your last chance to catch problems before printing. A good preview shows solid, consistent layers."},
      {text:"Click Export G-code. Save to the SD card.",why:"The MK3S reads G-code only from the SD card — not USB, not WiFi."},

    orientationTip:{title:"Model orientation matters",lines:["FDM parts are strongest in the XY plane (horizontal) and weakest in Z (vertical, between layers).","Flat bottoms print better than pointed or rounded bottoms — they give the first layer more surface area to grip.","Minimise overhangs: rotate the model so the least amount of material is unsupported."]},
    note:{type:"caution",title:"SD card only — not USB.",lines:["The MK3S does not recognise USB drives. Always export G-code to the SD card."]},

      {q:"Why does using the wrong printer profile matter?",options:["It only affects print speed, nothing serious","It generates G-code with wrong dimensions and temperatures — it can damage the printer","The print will look slightly different but still work","PrusaSlicer won't let you export if the profile is wrong"],correct:1,explanation:"The printer profile encodes the physical dimensions of the MK3S — bed size, axis limits, temperature ranges. The wrong profile can command movements the printer can't safely make."},

    id:2,
    title:"Prepare the Printer",
    goal:"Print sheet clean. Filament loaded. Printer ready.",
    objective:"You will understand why bed preparation is critical and what a correctly loaded filament looks and feels like.",
    time:"~5 min",
    needs:"A sink with soap and water, and an SD card (check the slot on the left of the LCD, or look near the printer).",
    steps:[
      {text:"Remove the print sheet. Lift it straight up by the corners — it is held on by magnets.",why:"The magnets hold it firmly but release straight up. Don't slide sideways — this can misalign the magnet positions."},
      {text:"Wash the print sheet with dish soap and warm water.",why:"Dish soap removes skin oils and dust. These create invisible barriers that stop PLA from bonding — even one fingerprint in the print area can cause the first layer to peel."},
      {text:"Rinse it completely. No soap residue.",why:"Soap residue is also a release agent. Rinse until water sheets off without bubbling."},
      {text:"Dry with a clean lint-free cloth.",why:"Water droplets are fine — PLA printing temp is far above boiling. But dry it so you don't drip on electronics."},
      {text:"Replace the sheet on the printer, textured surface up. It will click into place on the magnets.",why:"The textured side faces up and helps the print adhere. It should sit flat with no lifting at the edges."},
      {text:"Hold the sheet by the edges only. Never touch the flat printing surface.",why:"Skin oil transfers immediately on contact. You won't see it, but the PLA will find it."},
      {text:"Check filament is loaded. Look at the extruder at the top of the printer — filament should be fed in from above and disappear into the tube below.",why:"An empty extruder means no plastic will flow when printing starts. The printer won't tell you — it will just move with no plastic coming out."},
    ],
    note:{type:"note",title:"If filament is not loaded:",lines:["On the LCD go to Settings › Load Filament.","The printer heats the nozzle to printing temperature (~215°C for PLA).","When prompted, push the filament in from the top of the extruder.","Feed it until you see clean, consistent plastic coming from the nozzle tip.","Wipe the nozzle tip with a dry cloth to remove any ooze."]},
    done:"Print sheet is on. Surface is clean. Filament is loaded and extruding.",
    reflection:"Why does skin oil on the print sheet cause print failures? If you can answer this, you'll remember to handle the sheet by its edges every time.",
    quiz:[
      {q:"Why do you wash the print sheet with dish soap and warm water?",options:["To make the surface rougher so PLA grips better","Skin oils create an invisible barrier that stops PLA bonding to the surface","Soap helps the print release more easily after printing","To remove dust that could clog the nozzle"],correct:1,explanation:"Skin oils are a release agent — PLA can't bond through them. Even a single fingerprint in the print area can cause the first layer to peel. That's why you handle the sheet by its edges every time."},
      {q:"What does an empty extruder cause when you start a print?",options:["An error message on the LCD","The printer moves normally but deposits no plastic","The printer refuses to start","The nozzle overheats"],correct:1,explanation:"The printer has no way to detect missing filament — it just moves as programmed with nothing coming out. You'll often only notice at layer 3 or 4 when you realise nothing is being printed."},

      {text:"The printer purges a short line of filament at the front-left of the bed before starting. This is normal — it primes the nozzle.",why:"The purge line clears any ooze from the nozzle tip and ensures clean, consistent extrusion when the actual print begins. Don't remove it until the print is done."},

    steps:[
      {text:"Wait for the LCD to show 'Print finished'. Do not remove the print early.",why:"The nozzle is still at printing temperature (~215°C). Touching it or the heater block causes serious burns."},
      {text:"Wait 5–10 minutes for the sheet to cool to room temperature.",why:"PLA releases from the textured sheet as it cools and contracts. Removing it hot can tear the print or damage the sheet surface."},
      {text:"Remove the sheet by lifting straight up by the corners.",why:"Straight up releases the magnets cleanly. Sliding sideways can scratch the PEI surface."},
      {text:"Flex the sheet gently — bend it slightly both ways. The print will pop off cleanly.",why:"The spring steel flexes; PLA doesn't. The differential stress breaks the bond. No tools needed or wanted."},
      {text:"Do not use metal tools to remove the print. Only use a plastic scraper if the print is very stuck.",why:"Metal tools scratch the PEI coating. Once scratched, prints no longer release cleanly. The sheet costs ~€20 to replace."},
      {text:"Remove support structures if present. Snap with fingers or use flush cutters.",why:"Supports are designed to break away cleanly."},
      {text:"Unload the filament: LCD › Settings › Unload Filament. Guide it gently as it retracts.",why:"Never yank the filament out cold — this can pull melted plastic into the cold zone and cause a clog. Always use the unload menu so the printer heats and retracts correctly."},
      {text:"Store filament immediately in a sealed bag with silica gel.",why:"PLA absorbs moisture in as little as a few hours in humid environments. Wet filament prints poorly."},
      {text:"The printer automatically cools down after the print is finished. Wait until the LCD shows the nozzle temperature is below 50°C.",why:"The printer cools the nozzle automatically after a print completes. Waiting for below 50°C ensures it is safe to power off without risking heat creep."},
      {text:"Once the nozzle is below 50°C, turn off the power switch at the back of the printer.",why:"Below 50°C the PTFE tube and hotend internals are safe."},
    ],
    warning:{type:"warning",title:"Heat creep — do not power off while the nozzle is still hot.",lines:["If you power off while the nozzle is still hot, residual heat travels up into the cold zone. Filament softens and expands where it shouldn't, creating a jam that requires partial disassembly to clear."]},
    done:"Print removed. Filament stored. Printer cooled below 50°C and off.",
    reflection:"What is heat creep, and why does powering off while the nozzle is still hot cause it? If you understand this, you will never skip waiting for it to cool.",
    quiz:[
      {q:"What is heat creep, and why does it matter?",options:["The bed slowly warping upward during a long print","Residual heat travelling up the hotend after power-off, melting filament in the cold zone and causing a hard-to-fix clog","The nozzle temperature gradually rising above the set point","PLA softening and deforming in a warm room after printing"],correct:1,explanation:"If you power off while the nozzle is hot, heat continues travelling upward into the cold zone. Filament softens and expands where it shouldn't, jamming the entire path. It takes 30+ minutes to fix. The Cooldown sequence prevents it entirely."},
      {q:"Why do you flex the print sheet to remove the print, rather than using a scraper?",options:["Flexing is faster","Scrapers are too expensive to keep at VHS","Scrapers scratch the PEI coating — once scratched, prints no longer release cleanly","The sheet is too thin to flex safely"],correct:2,explanation:"The spring steel flexes; PLA doesn't. That differential stress cleanly breaks the bond. Scrapers gouge the PEI surface, creating low spots where prints stick permanently. The sheet costs around €20 to replace."},
    ],

function PrinterDiagram() {
  return (
    <div style={{marginBottom:16,borderRadius:8,overflow:"hidden",border:"1px solid #E8E8E8",background:"#fff"}}>
      <img src={PRINTER_IMG} alt="Prusa MK3S labelled diagram" style={{width:"100%",display:"block"}} />
    </div>
  );
}

function Callout({type,title,lines=[],children,labelOverride}) {
  const cfg = {
    danger:{bar:C.red,bg:C.redLt,label:"DANGER — "},
    warning:{bar:C.amber,bg:C.amberLt,label:"WARNING — "},
    caution:{bar:C.gold,bg:C.goldLt,label:"CAUTION — "},
    note:{bar:C.blue,bg:C.blueLt,label:"NOTE — "},
    done:{bar:C.green,bg:C.greenLt,label:"✓ DONE WHEN — "},
    why:{bar:C.teal,bg:C.tealLt,label:"WHY THIS MATTERS — "},
    reflect:{bar:"#7B4FE9",bg:"#F5F0FF",label:"REFLECT — "},
    objective:{bar:"#1A6B5A",bg:"#F0FAF7",label:"LEARNING OBJECTIVE — "},
    tip:{bar:"#5B6AF0",bg:"#F0F1FF",label:"TIP — "},
  };
  const s=cfg[type]||cfg.note;
  return (
    <div style={{borderLeft:`4px solid ${s.bar}`,background:s.bg,borderRadius:"0 6px 6px 0",padding:"12px 16px",margin:"12px 0"}}>
      <div style={{fontWeight:700,color:s.bar,fontSize:"0.78rem",letterSpacing:"0.05em",marginBottom:lines.length||children?5:0}}>{labelOverride||s.label}{title}</div>
      {lines.map((l,i)=><div key={i} style={{fontSize:"0.85rem",color:"#333",marginTop:4,lineHeight:1.6,fontFamily:"'DM Sans', sans-serif"}}>{l}</div>)}
      {children}
    </div>
  );
}

function Step({text,why,done,onToggle,num,showWhy,img}) {
  const [expanded,setExpanded]=useState(false);
  return (
    <div style={{borderBottom:`1px solid ${C.rule}`}}>
      <button onClick={onToggle} style={{display:"flex",alignItems:"flex-start",gap:12,width:"100%",background:"none",border:"none",cursor:"pointer",padding:"10px 0 8px",textAlign:"left"}}>
        <div style={{width:22,height:22,borderRadius:4,border:`2px solid ${done?C.blue:"#CCCCCC"}`,background:done?C.blue:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1,transition:"all 0.15s"}}>
          {done&&<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
        </div>
        <span style={{fontSize:"0.85rem",color:done?C.subtle:C.text,textDecoration:done?"line-through":"none",lineHeight:1.55,fontFamily:"'DM Sans', sans-serif",flex:1}}>
          <span style={{color:done?"#bbb":C.blue,fontWeight:700,marginRight:6}}>{num}.</span>{text}
        </span>
      </button>
      {img&&<div style={{margin:"6px 0 8px 34px",borderRadius:6,overflow:"hidden",border:"1px solid #E8E8E8"}}><img src={img} alt="PrusaSlicer print settings" style={{width:"100%",display:"block"}}/></div>}
      {why&&showWhy&&(
        <div>
          <button onClick={()=>setExpanded(e=>!e)} style={{background:"none",border:"none",cursor:"pointer",fontSize:"0.72rem",color:C.teal,fontWeight:700,padding:"0 0 6px 34px",letterSpacing:"0.05em",display:"flex",alignItems:"center",gap:4}}>
            <span style={{display:"inline-block",transform:expanded?"rotate(90deg)":"none",transition:"transform 0.15s"}}>▶</span> WHY?
          </button>
          {expanded&&<div style={{marginLeft:34,marginBottom:8,padding:"8px 12px",background:C.tealLt,borderLeft:`3px solid ${C.teal}`,borderRadius:"0 4px 4px 0",fontSize:"0.82rem",color:"#4A7A6E",lineHeight:1.6,fontFamily:"'DM Sans', sans-serif"}}>{why}</div>}
        </div>
      )}
    </div>
  );
}

function Quiz({questions,taskId,answers,onAnswer}) {
  return (
    <div style={{marginTop:8}}>
      {questions.map((q,qi)=>{
        const key=`${taskId}-${qi}`;
        const answered=answers[key]!==undefined;
        const selected=answers[key];
        const correct=selected===q.correct;
        return (
          <div key={qi} style={{background:"#fff",border:`1px solid ${answered?(correct?"#A8D5B5":"#F0B8B2"):"#E8E8E8"}`,borderRadius:8,padding:"12px 14px",marginBottom:10}}>
            <div style={{fontFamily:"'DM Sans', sans-serif",fontWeight:600,fontSize:"0.87rem",color:"#1B2A3B",marginBottom:10,lineHeight:1.5}}>{q.q}</div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {q.options.map((opt,oi)=>{
                let bg="#F7F8FA",border="#E0E0E0",color="#333";
                if(answered){
                  if(oi===q.correct){bg="#F2FAF5";border="#1E6B3C";color="#1E6B3C";}
                  else if(oi===selected){bg="#FDF3F2";border="#C0392B";color="#C0392B";}
                  else{bg="#F7F8FA";border="#E0E0E0";color="#AAA";}
                }
                return (
                  <button key={oi} onClick={()=>!answered&&onAnswer(key,oi)}
                    style={{background:bg,border:`1px solid ${border}`,borderRadius:6,padding:"8px 12px",cursor:answered?"default":"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:8,transition:"all 0.15s"}}>
                    <span style={{width:18,height:18,borderRadius:"50%",border:`1px solid ${border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.6rem",flexShrink:0,color}}>
                      {answered&&oi===q.correct?"✓":answered&&oi===selected?"✗":String.fromCharCode(65+oi)}
                    </span>
                    <span style={{fontFamily:"'DM Sans', sans-serif",fontSize:"0.83rem",color,lineHeight:1.45}}>{opt}</span>
                  </button>
                );
              })}
            </div>
            {answered&&(
              <div style={{marginTop:10,padding:"8px 10px",background:correct?"#F2FAF5":"#FDF3F2",borderLeft:`3px solid ${correct?"#1E6B3C":"#C0392B"}`,borderRadius:"0 4px 4px 0",fontSize:"0.8rem",color:"#333",fontFamily:"'DM Sans', sans-serif",lineHeight:1.55}}>
                <span style={{fontWeight:700,color:correct?"#1E6B3C":"#C0392B"}}>{correct?"Correct. ":"Not quite. "}</span>{q.explanation}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

          <button className="tap" onClick={goHome} style={{marginTop:16,background:"none",border:"1px solid #E0E0E0",borderRadius:8,padding:"10px 12px",color:C.subtle,cursor:"pointer",fontSize:"0.88rem",fontFamily:"'DM Sans', sans-serif"}}>← Home</button>
        </div>
      </Page>

            <button className="tap" onClick={goHome} style={{background:"none",border:"1px solid #E0E0E0",borderRadius:8,padding:"10px 12px",color:C.subtle,cursor:"pointer",fontSize:"0.88rem",fontFamily:"'DM Sans', sans-serif"}}>← Home</button>
          </div>
        </div>
      </Page>

                  {task.firstLayer.bad.map((t,i)=><div key={i} style={{fontSize:"0.75rem",color:"#333",marginBottom:5,lineHeight:1.4,fontFamily:"'DM Sans', sans-serif"}}>– {t}</div>)}

              {cancelOpen&&(
                <div style={{background:C.blueLt,border:"1px solid #D0E8F5",borderTop:"none",borderRadius:"0 0 6px 6px",padding:"12px 14px",marginBottom:6}}>
                  {task.cancelDecision.items.map((item,i)=>(
                    <div key={i} style={{display:"flex",gap:10,marginBottom:8,alignItems:"flex-start"}}>
                      <span style={{fontSize:"0.9rem",flexShrink:0}}>{item.cancel?"🛑":"✅"}</span>
                      <div>
                        <div style={{fontFamily:"'DM Sans', sans-serif",fontSize:"0.82rem",fontWeight:600,color:C.text}}>{item.situation}</div>
                        <div style={{fontFamily:"'DM Sans', sans-serif",fontSize:"0.78rem",color:item.cancel?C.red:C.green,marginTop:2}}>{item.action}</div>
                      </div>
                    </div>
                  ))}
                </div>
              )}
              {task.after&&<div style={{fontSize:"0.82rem",color:C.muted,fontFamily:"'DM Sans', sans-serif",lineHeight:1.55,marginTop:10,fontStyle:"italic"}}>{task.after}</div>}
            </>
          )}
          {task.note&&<Callout type={task.note.type} title={task.note.title} lines={task.note.lines}/>}
          {!task.firstLayer&&task.warning&&task.steps&&<Callout type={task.warning.type} title={task.warning.title} lines={task.warning.lines}/>}
          <Callout type="done" title={task.done}/>
          <Callout type="reflect" title={task.reflection}/>
          <div style={{display:"flex",gap:8,marginTop:16,flexWrap:"wrap"}}>
            {!taskDone[task.id]?(
              <button className="tap" onClick={()=>setTaskDone(p=>({...p,[task.id]:true}))} style={{background:C.blue,border:"none",borderRadius:8,padding:"10px 20px",color:"#fff",fontWeight:700,cursor:"pointer",fontSize:"0.88rem",fontFamily:"'DM Sans', sans-serif"}}>Mark Task Complete ✓</button>
            ):(
              <div style={{background:C.greenLt,border:"1px solid #A8D5B5",borderRadius:8,padding:"10px 14px",color:C.green,fontWeight:700,fontSize:"0.88rem",fontFamily:"'DM Sans', sans-serif"}}>✓ Completed</div>
            )}
            {task.id<TASKS.length&&(
              <button className="tap" onClick={()=>goTask(task.id+1)} style={{background:C.grey,border:"1px solid #D0D8E0",borderRadius:8,padding:"10px 14px",color:C.navy,fontWeight:600,cursor:"pointer",fontSize:"0.88rem",fontFamily:"'DM Sans', sans-serif"}}>Next Task →</button>
            )}
            {task.id===TASKS.length&&allTasksDone&&(
              <button className="tap" onClick={()=>goView("readiness")} style={{background:C.green,border:"none",borderRadius:8,padding:"10px 14px",color:"#fff",fontWeight:700,cursor:"pointer",fontSize:"0.88rem",fontFamily:"'DM Sans', sans-serif"}}>Am I ready to print? →</button>
            )}
            <button className="tap" onClick={goHome} style={{background:"none",border:"1px solid #E0E0E0",borderRadius:8,padding:"10px 12px",color:C.subtle,cursor:"pointer",fontSize:"0.88rem",fontFamily:"'DM Sans', sans-serif"}}>← Home</button>
          </div>
        </div>
      </Page>
    );
  }

  return (
    <Page>
      <div style={{paddingTop:22}}>
        <div style={{marginBottom:20}}>
          <div style={{fontSize:"0.68rem",color:C.blue,fontWeight:700,letterSpacing:"0.12em",marginBottom:5}}>VANCOUVER HACKSPACE · VHS-3DP-PRUSAMK3</div>
          <div style={{fontFamily:"'DM Sans', sans-serif",fontWeight:700,fontSize:"1.6rem",color:C.navy,lineHeight:1.2,marginBottom:6}}>3D Printing<br/>User Guide</div>
          <div style={{fontSize:"0.82rem",color:C.muted,fontFamily:"'DM Sans', sans-serif"}}><a href="https://help.prusa3d.com/downloads/mk3s" target="_blank" rel="noopener noreferrer" style={{color:C.blue,textDecoration:"none"}}>Original Prusa i3 MK3S</a> · Version 1.0</div>
        </div>

        <button className="tap" onClick={()=>goView("emergency")} style={{width:"100%",background:C.redLt,border:"1px solid #F0B8B2",borderLeft:`4px solid ${C.red}`,borderRadius:"0 8px 8px 0",padding:"11px 14px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,textAlign:"left"}}>
          <div>
            <div style={{fontWeight:700,color:C.red,fontSize:"0.8rem",fontFamily:"'DM Sans', sans-serif",marginBottom:2}}>⚠ Emergency Stop</div>
            <div style={{fontSize:"0.75rem",color:"#555",fontFamily:"'DM Sans', sans-serif"}}>Smoke, burning smell, scraping, or LCD error → tap here</div>
          </div>
          <span style={{color:C.red}}>›</span>
        </button>

        <Callout type="warning" title="You must stay in the room where your print job is running and be able to look up and check on it occasionally from your seat." labelOverride="NOTE — "/>

        {completedCount>0&&(
          <div style={{background:"#fff",border:"1px solid #E8E8E8",borderRadius:8,padding:"11px 14px",marginTop:8,display:"flex",alignItems:"center",gap:12}}>
            <div style={{flex:1}}>
              <div style={{fontSize:"0.68rem",color:C.subtle,letterSpacing:"0.08em",marginBottom:5}}>YOUR PROGRESS</div>
              <div style={{height:4,background:"#EEE",borderRadius:2}}>
                <div style={{width:`${(completedCount/TASKS.length)*100}%`,height:"100%",background:completedCount===TASKS.length?C.green:C.blue,borderRadius:2,transition:"width 0.4s"}}/>
              </div>
            </div>
            <div style={{fontFamily:"'DM Sans', sans-serif",fontWeight:700,color:completedCount===TASKS.length?C.green:C.blue,fontSize:"0.9rem"}}>{completedCount}/{TASKS.length}</div>
          </div>
        )}
        {allTasksDone&&(
          <button className="tap" onClick={()=>goView("readiness")} style={{width:"100%",background:C.greenLt,border:"1px solid #A8D5B5",borderLeft:`4px solid ${C.green}`,borderRadius:"0 8px 8px 0",padding:"11px 14px",marginTop:8,cursor:"pointer",textAlign:"left",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontFamily:"'DM Sans', sans-serif",fontWeight:700,color:C.green,fontSize:"0.88rem"}}>✓ All tasks done — am I ready to print? →</span>
          </button>
        )}

        <SectionLabel text="START HERE"/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:4}}>
          {[{label:"How This Printer Works",sub:"Build your mental model first",view:"howItWorks",icon:"🧠"},{label:"Choosing Filament",sub:"Decision framework + material guide",view:"filament",icon:"🧵"}].map((item)=>(
            <button key={item.view} className="tap" onClick={()=>goView(item.view)} style={{background:"#fff",border:"1px solid #E8E8E8",borderRadius:8,padding:"12px",cursor:"pointer",textAlign:"left"}}>
              <div style={{fontSize:"1.3rem",marginBottom:4}}>{item.icon}</div>
              <div style={{fontFamily:"'DM Sans', sans-serif",fontWeight:700,fontSize:"0.83rem",color:C.navy,marginBottom:2}}>{item.label}</div>
              <div style={{fontSize:"0.72rem",color:C.subtle,fontFamily:"'DM Sans', sans-serif"}}>{item.sub}</div>
            </button>
          ))}
        </div>

        <SectionLabel text="5 TASKS — COMPLETE IN ORDER"/>
        <div style={{display:"flex",flexDirection:"column",gap:7,marginBottom:20}}>
          {TASKS.map((t)=>{
            const prog=taskProgress(t);
            const done=taskDone[t.id];
            return (
              <button key={t.id} className="tap" onClick={()=>goTask(t.id)} style={{display:"flex",alignItems:"center",background:"#fff",border:`1px solid ${done?"#A8D5B5":"#E8E8E8"}`,borderRadius:8,cursor:"pointer",overflow:"hidden",textAlign:"left"}}>
                <div style={{width:42,background:done?C.green:C.blue,display:"flex",alignItems:"center",justifyContent:"center",alignSelf:"stretch",flexShrink:0}}>
                  <span style={{color:"#fff",fontWeight:700,fontSize:done?"0.95rem":"1.1rem"}}>{done?"✓":t.id}</span>
                </div>
                <div style={{flex:1,padding:"10px 12px"}}>
                  <div style={{fontFamily:"'DM Sans', sans-serif",fontWeight:600,fontSize:"0.88rem",color:done?C.subtle:C.navy,marginBottom:2}}>{t.title}</div>
                  <div style={{fontSize:"0.72rem",color:"#AAA",fontFamily:"'DM Sans', sans-serif"}}>{t.goal} · {t.time}</div>
                  {prog.done>0&&!done&&<div style={{marginTop:5,height:2,background:"#EEE",borderRadius:1}}><div style={{width:`${prog.pct}%`,height:"100%",background:C.blue,borderRadius:1}}/></div>}
                </div>
                <span style={{padding:"0 12px",color:"#CCC"}}>›</span>
              </button>
            );
          })}
        </div>

        <SectionLabel text="ALSO AVAILABLE"/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
          {[{label:"Knowledge Check",sub:"10 questions across all 5 tasks",view:"knowledge"},{label:"Am I Ready?",sub:"Self-assessment checklist",view:"readiness"},{label:"What's Next",sub:"After your first print",view:"nextSteps"}].map((item)=>(
            <button key={item.label} className="tap" onClick={()=>goView(item.view)} style={{background:"#fff",border:"1px solid #E8E8E8",borderRadius:8,padding:"12px",cursor:"pointer",textAlign:"left"}}>
              <div style={{fontFamily:"'DM Sans', sans-serif",fontWeight:700,fontSize:"0.83rem",color:C.navy,marginBottom:2}}>{item.label}</div>
              <div style={{fontSize:"0.72rem",color:C.subtle,fontFamily:"'DM Sans', sans-serif"}}>{item.sub}</div>
            </button>
          ))}
        </div>

        <div style={{marginTop:20,fontSize:"0.68rem",color:"#CCCCCC",textAlign:"center",fontFamily:"'DM Sans', sans-serif"}}>
          VHS-3DP-PRUSAMK3 · Training Guide · v1.0 · April 2026
        </div>
      </div>
    </Page>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
