const DIAGRAM_LABELS = [
  {id:"filament",x:72,y:3,title:"Filament",desc:"The plastic material fed into the printer. PLA is recommended for beginners."},
  {id:"spool",x:72,y:10,title:"Filament Holder",desc:"Holds the spool so it unwinds freely as the extruder pulls filament through."},
  {id:"frame",x:8,y:22,title:"Printer Frame",desc:"The rigid structural skeleton. Keeps all axes aligned and square."},
  {id:"zaxis",x:8,y:28,title:"Z-Axis",desc:"Moves the print bed up and down. Each increment = one layer height."},
  {id:"motherboard",x:8,y:38,title:"Einsy RAMBo Board",desc:"The printer's brain. Controls all motors, heaters, fans, and sensors."},
  {id:"extruder",x:8,y:44,title:"Extruder",desc:"The motor that grips and drives filament into the hotend."},
  {id:"xaxis",x:72,y:44,title:"X-Axis",desc:"Moves the hotend left and right across the print."},
  {id:"hotend",x:38,y:52,title:"Hotend & Nozzle",desc:"Melts filament to ~215°C. The nozzle is 0.4 mm wide — about 4× the width of a human hair."},
  {id:"heatbed",x:60,y:62,title:"Heatbed",desc:"Heated to 60°C for PLA. Helps the first layer bond. The spring-steel PEI sheet sits on top."},
  {id:"yaxis",x:8,y:72,title:"Y-Axis",desc:"Moves the print bed toward and away from you during printing."},
  {id:"lcd",x:62,y:88,title:"LCD Panel & Knob",desc:"Your control interface. Rotate to navigate, press to select."},

function PrinterDiagram() {
  return (
    <div style={{marginBottom:16,borderRadius:8,overflow:"hidden",border:"1px solid #E8E8E8",background:"#fff"}}>
      <img src={PRINTER_IMG} alt="Prusa MK3S labelled diagram" style={{width:"100%",display:"block"}} />
    </div>
  );
}

// ── Shared components ─────────────────────────────────────────────────────────
function Callout({type,title,lines=[],children}) {
  const cfg = {
    danger:{bar:C.red,bg:C.redLt,label:"DANGER — "},
    warning:{bar:C.amber,bg:C.amberLt,label:"WARNING — "},
    caution:{bar:C.gold,bg:C.goldLt,label:"CAUTION — "},
    note:{bar:C.blue,bg:C.blueLt,label:"NOTE — "},
    done:{bar:C.green,bg:C.greenLt,label:"✓ DONE WHEN — "},
    why:{bar:C.teal,bg:C.tealLt,label:"WHY THIS MATTERS — "},
    reflect:{bar:"#7B4FE9",bg:"#F5F0FF",label:"REFLECT — "},
    objective:{bar:"#1A6B5A",bg:"#F0FAF7",label:"LEARNING OBJECTIVE — "},
    tip:{bar:"#5B6AF0",bg:"#F0F1FF",label:"TIP — "},
  };
  const s = cfg[type]||cfg.note;
  return (
    <div style={{borderLeft:`4px solid ${s.bar}`,background:s.bg,borderRadius:"0 6px 6px 0",padding:"12px 16px",margin:"12px 0"}}>
      <div style={{fontWeight:700,color:s.bar,fontSize:"0.78rem",letterSpacing:"0.05em",marginBottom:lines.length||children?5:0}}>{s.label}{title}</div>
      {lines.map((l,i)=><div key={i} style={{fontSize:"0.85rem",color:"#333",marginTop:4,lineHeight:1.6,fontFamily:"'DM Sans', sans-serif"}}>{l}</div>)}
      {children}
    </div>
  );
}

function Step({text,why,done,onToggle,num,showWhy}) {
  const [expanded,setExpanded] = useState(false);
  return (
    <div style={{borderBottom:`1px solid ${C.rule}`}}>
      <button onClick={onToggle} style={{display:"flex",alignItems:"flex-start",gap:12,width:"100%",background:"none",border:"none",cursor:"pointer",padding:"10px 0 8px",textAlign:"left"}}>

          {done&&<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
        </div>
        <span style={{fontSize:"0.85rem",color:done?C.subtle:C.text,textDecoration:done?"line-through":"none",lineHeight:1.55,fontFamily:"'DM Sans', sans-serif",flex:1}}>

        </span>
      </button>
      {why&&showWhy&&(
        <div>
          <button onClick={()=>setExpanded(e=>!e)} style={{background:"none",border:"none",cursor:"pointer",fontSize:"0.72rem",color:C.teal,fontWeight:700,padding:"0 0 6px 34px",letterSpacing:"0.05em",display:"flex",alignItems:"center",gap:4}}>
            <span style={{display:"inline-block",transform:expanded?"rotate(90deg)":"none",transition:"transform 0.15s"}}>▶</span> WHY?
          </button>
          {expanded&&<div style={{marginLeft:34,marginBottom:8,padding:"8px 12px",background:C.tealLt,borderLeft:`3px solid ${C.teal}`,borderRadius:"0 4px 4px 0",fontSize:"0.82rem",color:"#4A7A6E",lineHeight:1.6,fontFamily:"'DM Sans', sans-serif"}}>{why}</div>}
        </div>
      )}
    </div>
  );
}

function Quiz({questions,taskId,answers,onAnswer}) {
  return (
    <div style={{marginTop:8}}>
      {questions.map((q,qi)=>{
        const key=`${taskId}-${qi}`;
        const answered=answers[key]!==undefined;
        const selected=answers[key];
        const correct=selected===q.correct;
        return (
          <div key={qi} style={{background:"#fff",border:`1px solid ${answered?(correct?"#A8D5B5":"#F0B8B2"):"#E8E8E8"}`,borderRadius:8,padding:"12px 14px",marginBottom:10}}>
            <div style={{fontFamily:"'DM Sans', sans-serif",fontWeight:600,fontSize:"0.87rem",color:"#1B2A3B",marginBottom:10,lineHeight:1.5}}>{q.q}</div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {q.options.map((opt,oi)=>{
                let bg="#F7F8FA",border="#E0E0E0",color="#333";
                if(answered){
                  if(oi===q.correct){bg="#F2FAF5";border="#1E6B3C";color="#1E6B3C";}
                  else if(oi===selected){bg="#FDF3F2";border="#C0392B";color="#C0392B";}
                  else{bg="#F7F8FA";border="#E0E0E0";color="#AAA";}
                }
                return (
                  <button key={oi} onClick={()=>!answered&&onAnswer(key,oi)}
                    style={{background:bg,border:`1px solid ${border}`,borderRadius:6,padding:"8px 12px",cursor:answered?"default":"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:8,transition:"all 0.15s"}}>
                    <span style={{width:18,height:18,borderRadius:"50%",border:`1px solid ${border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.6rem",flexShrink:0,color}}>
                      {answered&&oi===q.correct?"✓":answered&&oi===selected?"✗":String.fromCharCode(65+oi)}
                    </span>
                    <span style={{fontFamily:"'DM Sans', sans-serif",fontSize:"0.83rem",color,lineHeight:1.45}}>{opt}</span>
                  </button>
                );
              })}
            </div>
            {answered&&(
              <div style={{marginTop:10,padding:"8px 10px",background:correct?"#F2FAF5":"#FDF3F2",borderLeft:`3px solid ${correct?"#1E6B3C":"#C0392B"}`,borderRadius:"0 4px 4px 0",fontSize:"0.8rem",color:"#333",fontFamily:"'DM Sans', sans-serif",lineHeight:1.55}}>
                <span style={{fontWeight:700,color:correct?"#1E6B3C":"#C0392B"}}>{correct?"Correct. ":"Not quite. "}</span>{q.explanation}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

            </div>
            <div style={{background:C.blueLt,padding:"12px 14px",flex:1}}>
              <div style={{fontSize:"0.68rem",color:C.blue,fontWeight:700,letterSpacing:"0.1em",marginBottom:2}}>TASK {task.id} · {task.time}</div>
              <div style={{fontFamily:"'DM Sans', sans-serif",fontWeight:700,fontSize:"1rem",color:C.navy,lineHeight:1.3}}>{task.title}</div>
              <div style={{fontSize:"0.75rem",color:C.muted,marginTop:3,fontFamily:"'DM Sans', sans-serif"}}>{task.goal}</div>
            </div>
          </div>

          <Callout type="objective" title={task.objective}/>

          {task.celebrate&&<div style={{background:"#FFFBF0",border:"1px solid #F5D76E",borderRadius:8,padding:"12px 14px",marginBottom:12,fontFamily:"'DM Sans', sans-serif",fontSize:"0.88rem",color:"#7D5F00",lineHeight:1.55}}>🎉 {task.celebrate}</div>}

          {task.needs&&<div style={{fontSize:"0.78rem",color:C.muted,background:C.grey,borderRadius:6,padding:"8px 12px",marginBottom:12,fontFamily:"'DM Sans', sans-serif",lineHeight:1.5}}><strong style={{color:"#444"}}>You will need: </strong>{task.needs}</div>}

          {task.modelTip&&<Callout type="tip" title={task.modelTip.title} lines={task.modelTip.lines}/>}
          {task.warning&&<Callout type={task.warning.type} title={task.warning.title} lines={task.warning.lines}/>}
          {task.whyFirstLayer&&<Callout type="why" title="Why the first layer is everything" lines={[task.whyFirstLayer]}/>}

          {task.steps&&(
            <div style={{marginBottom:12}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:16,marginBottom:6}}>
                <div style={{fontSize:"0.68rem",color:C.subtle,fontWeight:700,letterSpacing:"0.12em"}}>STEPS</div>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <button onClick={()=>setShowWhy(w=>!w)} style={{background:showWhy?C.tealLt:C.grey,border:`1px solid ${showWhy?C.teal:"#ddd"}`,borderRadius:6,padding:"3px 8px",cursor:"pointer",fontSize:"0.68rem",color:showWhy?C.teal:C.subtle,fontWeight:700,letterSpacing:"0.05em"}}>
                    {showWhy?"HIDE WHY":"SHOW WHY"}
                  </button>
                  <span style={{fontSize:"0.72rem",color:prog.done===prog.total?C.green:C.blue}}>{prog.done}/{prog.total}</span>
                </div>
              </div>
              <div style={{height:3,background:"#EEE",borderRadius:2,marginBottom:10}}>
                <div style={{width:`${prog.pct}%`,height:"100%",background:prog.pct===100?C.green:C.blue,borderRadius:2,transition:"width 0.3s"}}/>
              </div>
              {task.steps.map((step,i)=>(
                <Step key={i} num={i+1} text={step.text} why={step.why} showWhy={showWhy} done={!!checks[`${task.id}-${i}`]} onToggle={()=>toggleCheck(`${task.id}-${i}`)}/>
              ))}
            </div>
          )}

          {task.orientationTip&&<Callout type="tip" title={task.orientationTip.title} lines={task.orientationTip.lines}/>}

          {task.firstLayer&&(
            <>
              <div style={{fontSize:"0.68rem",color:C.subtle,fontWeight:700,letterSpacing:"0.12em",margin:"20px 0 10px"}}>FIRST LAYER ASSESSMENT</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
                <div style={{border:"1px solid #A8D5B5",borderLeft:`4px solid ${C.green}`,borderRadius:"0 6px 6px 0",background:C.greenLt,padding:12}}>
                  <div style={{fontWeight:700,color:C.green,fontSize:"0.78rem",marginBottom:8}}>✓ GOOD</div>
                  {task.firstLayer.good.map((t,i)=><div key={i} style={{fontSize:"0.75rem",color:"#333",marginBottom:5,lineHeight:1.4,fontFamily:"'DM Sans', sans-serif"}}>– {t}</div>)}
                </div>
                <div style={{border:"1px solid #F0B8B2",borderLeft:`4px solid ${C.red}`,borderRadius:"0 6px 6px 0",background:C.redLt,padding:12}}>
                  <div style={{fontWeight:700,color:C.red,fontSize:"0.78rem",marginBottom:8}}>✗ BAD</div>
                  {task.firstLayer.bad.map((t,i)=><div key={i} style={{fontSize:"0.75rem",color:"#333",marginBottom:5,lineHeight:1.4,fontFamily:"'DM Sans', sans-serif"}}>– {t}</div>)}
                </div>
              </div>
              <button onClick={()=>setLiveZOpen(p=>!p)} style={{width:"100%",background:liveZOpen?C.redLt:"#fff",border:`1px solid ${liveZOpen?C.red:"#EEE"}`,borderLeft:`4px solid ${C.red}`,borderRadius:"0 6px 6px 0",padding:"11px 14px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:2}}>
                <span style={{fontFamily:"'DM Sans', sans-serif",fontWeight:700,fontSize:"0.83rem",color:C.red,textAlign:"left"}}>First layer looks bad? → Adjust Live Adjust Z</span>
                <span style={{color:C.red,display:"inline-block",transform:liveZOpen?"rotate(180deg)":"none",transition:"transform 0.2s"}}>▼</span>
              </button>
              {liveZOpen&&(
                <div style={{background:C.redLt,border:"1px solid #F0B8B2",borderTop:"none",borderRadius:"0 0 6px 6px",padding:"12px 14px",marginBottom:6}}>
                  <Callout type="why" title="Why Live Adjust Z works" lines={[task.liveZ.why]}/>
                  {task.liveZ.steps.map((s,i)=>(
                    <div key={i} style={{display:"flex",gap:10,marginBottom:10,alignItems:"flex-start"}}>
                      <div style={{width:20,height:20,borderRadius:"50%",background:C.red,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.7rem",fontWeight:700,flexShrink:0}}>{i+1}</div>
                      <span style={{fontFamily:"'DM Sans', sans-serif",fontSize:"0.83rem",color:"#333",lineHeight:1.5,paddingTop:2}}>{s}</span>
                    </div>
                  ))}
                  <div style={{fontSize:"0.78rem",color:C.muted,fontStyle:"italic",fontFamily:"'DM Sans', sans-serif",lineHeight:1.5}}>{task.liveZ.note}</div>
                </div>
              )}
              <button onClick={()=>setCancelOpen(p=>!p)} style={{width:"100%",background:cancelOpen?C.blueLt:"#fff",border:`1px solid ${cancelOpen?C.blue:"#EEE"}`,borderLeft:`4px solid ${C.blue}`,borderRadius:"0 6px 6px 0",padding:"11px 14px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:6,marginBottom:2}}>
                <span style={{fontFamily:"'DM Sans', sans-serif",fontWeight:700,fontSize:"0.83rem",color:C.blue,textAlign:"left"}}>Should I cancel this print?</span>
                <span style={{color:C.blue,display:"inline-block",transform:cancelOpen?"rotate(180deg)":"none",transition:"transform 0.2s"}}>▼</span>
              </button>
              {cancelOpen&&(
                <div style={{background:C.blueLt,border:"1px solid #D0E8F5",borderTop:"none",borderRadius:"0 0 6px 6px",padding:"12px 14px",marginBottom:6}}>
                  {task.cancelDecision.items.map((item,i)=>(
                    <div key={i} style={{display:"flex",gap:10,marginBottom:8,alignItems:"flex-start"}}>
                      <span style={{fontSize:"0.9rem",flexShrink:0}}>{item.cancel?"🛑":"✅"}</span>
                      <div>
                        <div style={{fontFamily:"'DM Sans', sans-serif",fontSize:"0.82rem",fontWeight:600,color:C.text}}>{item.situation}</div>
                        <div style={{fontFamily:"'DM Sans', sans-serif",fontSize:"0.78rem",color:item.cancel?C.red:C.green,marginTop:2}}>{item.action}</div>
                      </div>
                    </div>
                  ))}
                </div>
              )}
              {task.after&&<div style={{fontSize:"0.82rem",color:C.muted,fontFamily:"'DM Sans', sans-serif",lineHeight:1.55,marginTop:10,fontStyle:"italic"}}>{task.after}</div>}
            </>
          )}

          {task.note&&<Callout type={task.note.type} title={task.note.title} lines={task.note.lines}/>}
          {!task.firstLayer&&task.warning&&task.steps&&<Callout type={task.warning.type} title={task.warning.title} lines={task.warning.lines}/>}

          <Callout type="done" title={task.done}/>
          <Callout type="reflect" title={task.reflection}/>

          <div style={{display:"flex",gap:8,marginTop:16,flexWrap:"wrap"}}>
            {!taskDone[task.id]?(
              <button className="tap" onClick={()=>setTaskDone(p=>({...p,[task.id]:true}))} style={{background:C.blue,border:"none",borderRadius:8,padding:"10px 20px",color:"#fff",fontWeight:700,cursor:"pointer",fontSize:"0.88rem",fontFamily:"'DM Sans', sans-serif"}}>Mark Task Complete ✓</button>
            ):(
              <div style={{background:C.greenLt,border:"1px solid #A8D5B5",borderRadius:8,padding:"10px 14px",color:C.green,fontWeight:700,fontSize:"0.88rem",fontFamily:"'DM Sans', sans-serif"}}>✓ Completed</div>
            )}
            {task.id<TASKS.length&&(
              <button className="tap" onClick={()=>goTask(task.id+1)} style={{background:C.grey,border:"1px solid #D0D8E0",borderRadius:8,padding:"10px 14px",color:C.navy,fontWeight:600,cursor:"pointer",fontSize:"0.88rem",fontFamily:"'DM Sans', sans-serif"}}>Next Task →</button>
            )}
            {task.id===TASKS.length&&allTasksDone&&(
              <button className="tap" onClick={()=>goView("readiness")} style={{background:C.green,border:"none",borderRadius:8,padding:"10px 14px",color:"#fff",fontWeight:700,cursor:"pointer",fontSize:"0.88rem",fontFamily:"'DM Sans', sans-serif"}}>Am I ready to print? →</button>
            )}
            <button className="tap" onClick={goHome} style={{background:"none",border:"1px solid #E0E0E0",borderRadius:8,padding:"10px 12px",color:C.subtle,cursor:"pointer",fontSize:"0.88rem",fontFamily:"'DM Sans', sans-serif"}}>← Home</button>
          </div>
        </div>
      </Page>
    );
  }

  return (
    <Page>
      <div style={{paddingTop:22}}>
        <div style={{marginBottom:20}}>
          <div style={{fontSize:"0.68rem",color:C.blue,fontWeight:700,letterSpacing:"0.12em",marginBottom:5}}>VANCOUVER HACKSPACE · VHS-3DP-PRUSAMK3</div>
          <div style={{fontFamily:"'DM Sans', sans-serif",fontWeight:700,fontSize:"1.6rem",color:C.navy,lineHeight:1.2,marginBottom:6}}>3D Printing<br/>User Guide</div>
          <div style={{fontSize:"0.82rem",color:C.muted,fontFamily:"'DM Sans', sans-serif"}}>Original Prusa i3 MK3S · Version 1.0</div>
        </div>

        <button className="tap" onClick={()=>goView("emergency")} style={{width:"100%",background:C.redLt,border:"1px solid #F0B8B2",borderLeft:`4px solid ${C.red}`,borderRadius:"0 8px 8px 0",padding:"11px 14px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,textAlign:"left"}}>
          <div>
            <div style={{fontWeight:700,color:C.red,fontSize:"0.8rem",fontFamily:"'DM Sans', sans-serif",marginBottom:2}}>⚠ Emergency Stop</div>
            <div style={{fontSize:"0.75rem",color:"#555",fontFamily:"'DM Sans', sans-serif"}}>Smoke, burning smell, scraping, or LCD error → tap here</div>
          </div>
          <span style={{color:C.red}}>›</span>
        </button>

        <Callout type="warning" title="You must stay within eyesight of your print job while it is running."/>

        {completedCount>0&&(
          <div style={{background:"#fff",border:"1px solid #E8E8E8",borderRadius:8,padding:"11px 14px",marginTop:8,display:"flex",alignItems:"center",gap:12}}>
            <div style={{flex:1}}>
              <div style={{fontSize:"0.68rem",color:C.subtle,letterSpacing:"0.08em",marginBottom:5}}>YOUR PROGRESS</div>
              <div style={{height:4,background:"#EEE",borderRadius:2}}>
                <div style={{width:`${(completedCount/TASKS.length)*100}%`,height:"100%",background:completedCount===TASKS.length?C.green:C.blue,borderRadius:2,transition:"width 0.4s"}}/>
              </div>
            </div>
            <div style={{fontFamily:"'DM Sans', sans-serif",fontWeight:700,color:completedCount===TASKS.length?C.green:C.blue,fontSize:"0.9rem"}}>{completedCount}/{TASKS.length}</div>
          </div>
        )}
        {allTasksDone&&(
          <button className="tap" onClick={()=>goView("readiness")} style={{width:"100%",background:C.greenLt,border:"1px solid #A8D5B5",borderLeft:`4px solid ${C.green}`,borderRadius:"0 8px 8px 0",padding:"11px 14px",marginTop:8,cursor:"pointer",textAlign:"left",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontFamily:"'DM Sans', sans-serif",fontWeight:700,color:C.green,fontSize:"0.88rem"}}>✓ All tasks done — am I ready to print? →</span>
          </button>
        )}

        <SectionLabel text="START HERE"/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:4}}>
          {[{label:"How This Printer Works",sub:"Build your mental model first",view:"howItWorks",icon:"🧠"},{label:"Choosing Filament",sub:"Decision framework + material guide",view:"filament",icon:"🧵"}].map((item)=>(
            <button key={item.view} className="tap" onClick={()=>goView(item.view)} style={{background:"#fff",border:"1px solid #E8E8E8",borderRadius:8,padding:"12px",cursor:"pointer",textAlign:"left"}}>
              <div style={{fontSize:"1.3rem",marginBottom:4}}>{item.icon}</div>
              <div style={{fontFamily:"'DM Sans', sans-serif",fontWeight:700,fontSize:"0.83rem",color:C.navy,marginBottom:2}}>{item.label}</div>
              <div style={{fontSize:"0.72rem",color:C.subtle,fontFamily:"'DM Sans', sans-serif"}}>{item.sub}</div>
            </button>
          ))}
        </div>

        <SectionLabel text="5 TASKS — COMPLETE IN ORDER"/>
        <div style={{display:"flex",flexDirection:"column",gap:7,marginBottom:20}}>
          {TASKS.map((t)=>{
            const prog=taskProgress(t);
            const done=taskDone[t.id];
            return (
              <button key={t.id} className="tap" onClick={()=>goTask(t.id)} style={{display:"flex",alignItems:"center",background:"#fff",border:`1px solid ${done?"#A8D5B5":"#E8E8E8"}`,borderRadius:8,cursor:"pointer",overflow:"hidden",textAlign:"left"}}>
                <div style={{width:42,background:done?C.green:C.blue,display:"flex",alignItems:"center",justifyContent:"center",alignSelf:"stretch",flexShrink:0}}>
                  <span style={{color:"#fff",fontWeight:700,fontSize:done?"0.95rem":"1.1rem"}}>{done?"✓":t.id}</span>
                </div>
                <div style={{flex:1,padding:"10px 12px"}}>
                  <div style={{fontFamily:"'DM Sans', sans-serif",fontWeight:600,fontSize:"0.88rem",color:done?C.subtle:C.navy,marginBottom:2}}>{t.title}</div>
                  <div style={{fontSize:"0.72rem",color:"#AAA",fontFamily:"'DM Sans', sans-serif"}}>{t.time} · {t.goal}</div>
                  {prog.done>0&&!done&&<div style={{marginTop:5,height:2,background:"#EEE",borderRadius:1}}><div style={{width:`${prog.pct}%`,height:"100%",background:C.blue,borderRadius:1}}/></div>}
                </div>
                <span style={{padding:"0 12px",color:"#CCC"}}>›</span>
              </button>
            );
          })}
        </div>

        <SectionLabel text="ALSO AVAILABLE"/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
          {[{label:"Knowledge Check",sub:"10 questions across all 5 tasks",view:"knowledge"},{label:"Am I Ready?",sub:"Self-assessment checklist",view:"readiness"},{label:"What's Next",sub:"After your first print",view:"nextSteps"}].map((item)=>(
            <button key={item.label} className="tap" onClick={()=>goView(item.view)} style={{background:"#fff",border:"1px solid #E8E8E8",borderRadius:8,padding:"12px",cursor:"pointer",textAlign:"left"}}>
              <div style={{fontFamily:"'DM Sans', sans-serif",fontWeight:700,fontSize:"0.83rem",color:C.navy,marginBottom:2}}>{item.label}</div>
              <div style={{fontSize:"0.72rem",color:C.subtle,fontFamily:"'DM Sans', sans-serif"}}>{item.sub}</div>
            </button>
          ))}
        </div>

        <div style={{marginTop:20,fontSize:"0.68rem",color:"#CCCCCC",textAlign:"center",fontFamily:"'DM Sans', sans-serif"}}>
          VHS-3DP-PRUSAMK3 · Training Guide · v4.0 · April 2026
        </div>
      </div>
    </Page>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
